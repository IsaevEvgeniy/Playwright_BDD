name: Playwright

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npm run ci
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          BASE_URL_API: ${{ secrets.BASE_URL_API }}
          USER_STANDARD: ${{ secrets.USER_STANDARD }}
          PASSWORD_STANDARD: ${{ secrets.PASSWORD_STANDARD }}
          USER_LOCKED: ${{ secrets.USER_LOCKED }}
          PASSWORD_LOCKED: ${{ secrets.PASSWORD_LOCKED }}
          USER_PROBLEM: ${{ secrets.USER_PROBLEM }}
          PASSWORD_PROBLEM: ${{ secrets.PASSWORD_PROBLEM }}
          USER_PERFORMANCE_GLITCH: ${{ secrets.USER_PERFORMANCE_GLITCH }}
          PASSWORD_PERFORMANCE_GLITCH: ${{ secrets.PASSWORD_PERFORMANCE_GLITCH }}
          USER_ERROR: ${{ secrets.USER_ERROR }}
          PASSWORD_ERROR: ${{ secrets.PASSWORD_ERROR }}
          USER_VISUAL: ${{ secrets.USER_VISUAL }}
          PASSWORD_VISUAL: ${{ secrets.PASSWORD_VISUAL }}
          USER_INVALID: ${{ secrets.USER_INVALID }}
          PASSWORD_INVALID: ${{ secrets.PASSWORD_INVALID }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Generate Allure report
        if: always()
        run: npm run allure:generate

      - name: Deploy Allure to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report
